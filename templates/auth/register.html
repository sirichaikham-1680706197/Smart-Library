{% extends "base.html" %}
{% block title %}สมัครสมาชิก — Smart Library{% endblock %}
{% block content %}
<div class="auth-container">
    <div class="auth-card animate-in">
        <h2><i class="bi bi-person-plus me-2"></i>สมัครสมาชิก</h2>
        <p class="auth-subtitle">สร้างบัญชีเพื่อเริ่มใช้งาน</p>
        <form method="POST" action="{{ url_for('auth.register') }}">
            <div class="mb-3">
                <label class="form-label-custom">ชื่อผู้ใช้</label>
                <input type="text" name="username" class="form-control form-control-custom" placeholder="Username" required minlength="3">
            </div>
            <div class="mb-3">
                <label class="form-label-custom">อีเมล</label>
                <input type="email" name="email" class="form-control form-control-custom" placeholder="email@example.com" required>
            </div>
            <div class="mb-3">
                <label class="form-label-custom">รหัสผ่าน</label>
                <input type="password" name="password" class="form-control form-control-custom" placeholder="อย่างน้อย 6 ตัวอักษร" required minlength="6">
            </div>
            <div class="mb-4">
                <label class="form-label-custom">ยืนยันรหัสผ่าน</label>
                <input type="password" name="confirm_password" class="form-control form-control-custom" placeholder="กรอกรหัสผ่านอีกครั้ง" required minlength="6">
            </div>
            <button type="submit" class="btn btn-primary-custom w-100 mb-3">
                <i class="bi bi-person-check me-2"></i>สมัครสมาชิก
            </button>
        </form>
        <p class="text-center text-secondary mb-0" style="font-size:0.9rem;">
            มีบัญชีอยู่แล้ว? <a href="{{ url_for('auth.login') }}" class="text-gradient" style="text-decoration:none;font-weight:600;">เข้าสู่ระบบ</a>
        </p>
    </div>
</div>
{% endblock %}
